<div class="dashboard-container">
    <div *ngIf="analysisService.isLoading()">🚀 核心 AI 引擎正在逆向挖掘 Git 歷史並分析複雜度...</div>

    <div *ngIf="analysisService.error()" class="error-banner">{{ analysisService.error() }}</div>

    <div *ngIf="analysisService.mostDangerousFile() as topRisk" class="alert-card">
    ⚠️ 項目頭號技術債文件：<strong>{{ topRisk.file_name }}</strong> 
    (歷史修復 {{ topRisk.bug_fix_count }} 次，最大圈複雜度 {{ topRisk.metrics.max_complexity }})
    </div>

    <div *ngIf="!analysisService.isLoading() && analysisService.reportData().length > 0">
    <div *ngFor="let file of analysisService.reportData()" class="file-card">
        <h3>📁 {{ file.file_name }}</h3>
        <p>缺陷頻次：{{ file.bug_fix_count }} 次</p>
    </div>
    </div>
</div>
