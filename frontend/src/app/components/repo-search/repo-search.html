
<div id="poda">
  <div class="glow"></div>
  <div class="darkBorderBg"></div>
  <div class="darkBorderBg"></div>
  <div class="darkBorderBg"></div>

  <div class="white"></div>

  <div class="border"></div>

  <form id="main" #searchForm="ngForm" (ngSubmit)="onSubmit(searchForm)">
    <input 
        class="input"
        type="text" 
        name="repoUrl" 
        [(ngModel)]="urlInput"
        #repoModel="ngModel"
        required 
        appRepoValidator
        [disabled]="analysisService.isLoading()"
        placeholder="Please enter the GitHub repository URL (e.g., https://github.com/pallets/click)"
        [class.invalid]="repoModel.invalid && repoModel.touched"
    />
    <div id="input-mask"></div>
    <div id="pink-mask"></div>
    <div class="filterBorder" (click)="onSubmit(searchForm)"></div>
    <div id="search-icon">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke-linejoin="round"
        stroke-linecap="round"
        height="24"
        fill="none"
        class="feather feather-search"
      >
        <circle stroke="url(#search)" r="8" cy="11" cx="11"></circle>
        <line
          stroke="url(#searchl)"
          y2="16.65"
          y1="22"
          x2="16.65"
          x1="22"
        ></line>
        <defs>
          <linearGradient gradientTransform="rotate(50)" id="search">
            <stop stop-color="#f8e7f8" offset="0%"></stop>
            <stop stop-color="#b6a9b7" offset="50%"></stop>
          </linearGradient>
          <linearGradient id="searchl">
            <stop stop-color="#b6a9b7" offset="0%"></stop>
            <stop stop-color="#837484" offset="50%"></stop>
          </linearGradient>
        </defs>
      </svg>
    </div>
</form>
</div>
